services:
  - type: web
    name: filter-api
    runtime: node
    buildCommand: npm ci && npm run build:api
    startCommand: node packages/api/dist/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MAILGUN_WEBHOOK_SIGNING_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false

  - type: web
    name: filter-web
    runtime: static
    buildCommand: npm ci && npm run build:web
    staticPublishPath: packages/web/dist
    routes:
      - type: proxy
        source: /api/*
        destination: https://filter-api-wcmp.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
